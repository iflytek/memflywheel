name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Load environment
        run: cat .github/env >> $GITHUB_ENV

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22, 24]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Load environment
        run: cat .github/env >> $GITHUB_ENV

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Examples smoke test
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: |
          USE_FAKE=1 node examples/pi/run.mjs
          USE_FAKE=1 node examples/hermes/run.mjs
          USE_FAKE=1 node examples/openclaw/run.mjs
          USE_FAKE=1 node examples/learning-loop/run.mjs

      - name: Pack dry run
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: pnpm run pack:dry-run
